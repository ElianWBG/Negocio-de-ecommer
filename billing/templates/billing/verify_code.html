{% extends 'billing/base.html' %}
{% block title %}Verificar código{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-header bg-dark text-white"><h4>Verificar código de verificación</h4></div>
      <div class="card-body">
        <p class="text-muted">Ingresa el código que enviamos a tu correo para activar tu cuenta.</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" name="email" class="form-control" required
                   value="{{ request.GET.email|default:'' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Código de verificación</label>
            <input type="text" name="code" class="form-control" required
                   maxlength="6" inputmode="numeric" pattern="[0-9]{6}"
                   placeholder="123456">
          </div>
          <button type="submit" class="btn btn-primary w-100">Verificar</button>
        </form>
        <p class="mt-3 text-center">
          <a href="{% url 'login' %}">Volver al inicio de sesión</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
