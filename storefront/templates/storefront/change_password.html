{% extends 'storefront/base_public.html' %}
{% block title %}Cambiar contraseña{% endblock %}
{% block extra_css %}
<style>
  .auth-wrap { min-height:60vh; display:flex; align-items:center; justify-content:center; }
  .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:2.5rem; width:100%; max-width:440px; box-shadow:var(--shadow-lg); }
  .auth-card h1 { font-family:var(--font-head); font-size:2rem; margin-bottom:.3rem; }
  .auth-card .subtitle { color:var(--muted); margin-bottom:1.75rem; font-size:.9rem; }
  .pass-wrap { position:relative; }
  .pass-wrap .form-control { padding-right:2.75rem; }
  .eye-btn { position:absolute; right:.75rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--muted); padding:0; font-size:1rem; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Cambiar contraseña</h1>
    <p class="subtitle">Elige una contraseña segura de al menos 8 caracteres.</p>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Contraseña actual</label>
        <div class="pass-wrap">
          <input type="password" name="current_password" id="id_current" class="form-control" required autofocus>
          <button type="button" class="eye-btn" onclick="togglePass('id_current', this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nueva contraseña</label>
        <div class="pass-wrap">
          <input type="password" name="new_password1" id="id_new1" class="form-control" required>
          <button type="button" class="eye-btn" onclick="togglePass('id_new1', this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar nueva contraseña</label>
        <div class="pass-wrap">
          <input type="password" name="new_password2" id="id_new2" class="form-control" required>
          <button type="button" class="eye-btn" onclick="togglePass('id_new2', this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:.5rem;">
        Guardar nueva contraseña
      </button>
    </form>
    <div style="text-align:center;margin-top:1.25rem;">
      <a href="{% url 'storefront:my_orders' %}" style="color:var(--muted);font-size:.875rem;text-decoration:none;">
        ← Volver a mis pedidos
      </a>
    </div>
  </div>
</div>

<script>
function togglePass(fieldId, btn) {
  const field = document.getElementById(fieldId);
  const icon = btn.querySelector('i');
  if (field.type === 'password') {
    field.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    field.type = 'password';
    icon.className = 'bi bi-eye';
  }
}
</script>
{% endblock %}
