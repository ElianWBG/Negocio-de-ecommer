services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A sri_service worker -l info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis
      - web
