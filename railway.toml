[build]
builder = "nixpacks"

[phases.setup]
# Forzamos a que instale las dependencias correctamente
cmds = ["pip install -r requirements.txt"]

[phases.build]
# Recopilar estáticos (no requiere base de datos si configuras bien tus settings)
cmds = ["python manage.py collectstatic --noinput"]

[deploy]
# El comando de release se ejecuta justo antes de que el nuevo contenedor se active
# y SÍ tiene acceso a la red interna y a Postgres.
releaseCommand = "python manage.py migrate"
startCommand = "gunicorn config.wsgi --log-file -"